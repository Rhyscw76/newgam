<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gams Mobile</title>
    <style>
        :root {
            --p: #f00;
            --g: rgba(0, 0, 0, 0.9);
            --b: rgba(255, 255, 255, 0.2);
        }

        html {
            background: #000 url('ibg.svg') no-repeat center center fixed;
            background-size: cover;
            background-attachment: fixed;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
            background: transparent;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #pull-menu {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.98);
            border-bottom: 4px solid #f00;
            z-index: 9998;
            transform: translateY(-101%);
            padding: calc(env(safe-area-inset-top) + 20px) 20px 30px;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
            overflow-y: auto;
            max-height: 100vh;
        }

        #pull-menu.open {
            transform: translateY(0);
        }

        #pull-menu h2 {
            color: #f00;
            margin: 0 0 20px 0;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(3px);
            padding-top: env(safe-area-inset-top);
            overflow: hidden;
        }

        .ui-layer.hidden {
            display: none;
        }

        /* FLOATING TOP BAR PANEL */
        .top-bar {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            background: rgba(0, 0, 0, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 10px 14px 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 540px;
            width: calc(100% - 16px);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.8);
        }

        /* GAMS bubble centered above search, always glowing red */
        .gams-bubble-row {
            display: flex;
            justify-content: center;
        }

        .header-bubble {
            padding: 8px 24px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: radial-gradient(circle at top, rgba(255,255,255,0.12), rgba(0,0,0,0.9));
            cursor: pointer;
            transition: transform 0.15s ease;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); /* permanent glow */
        }

        .header-bubble:active {
            transform: scale(0.97);
        }

        .header-bubble h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 6px;
            color: #fff;
            text-shadow:
                0 0 8px rgba(255, 0, 0, 0.8),
                0 0 16px rgba(255, 0, 0, 0.7),
                0 0 24px rgba(255, 0, 0, 0.6);
        }

        .header-row {
            display: flex;
            align-items: center;
        }

        .search-container {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 999px;
            padding: 6px 12px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            gap: 8px;
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .fullscreen-circle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #fff;
            cursor: pointer;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.7);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .fullscreen-circle:active {
            transform: scale(0.9);
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.5);
            border-color: var(--p);
        }

        .library-line {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.75);
            text-align: center;
        }

        .grid {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
            margin: 0;
            margin-top: 170px; /* extra space for floating top bar */
        }

        .grid::-webkit-scrollbar {
            width: 6px;
        }

        .grid::-webkit-scrollbar-track {
            background: transparent;
        }

        .grid::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .tile {
            background: transparent;
            border: none;
            padding: 0;
            text-align: center;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
            display: flex;
            flex-direction: column;
            overflow: visible;
            border-radius: 18px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.6);
        }

        /* red highlight on press */
        .tile:active {
            transform: translateY(-4px) scale(0.98);
            border-color: var(--p);
            box-shadow: 0 0 18px rgba(255, 0, 0, 0.6);
        }

        /* optional: keep last clicked tile highlighted */
        .tile.selected {
            border-color: var(--p);
            box-shadow: 0 0 18px rgba(255, 0, 0, 0.7);
        }

        .tile-image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px 16px 0 0;
        }

        .tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .tile-label {
            padding: 10px 12px;
            background: rgba(30, 30, 30, 0.96);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 0 0 16px 16px;
            font-size: 12px;
            font-weight: 800;
            color: #fff;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-red {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
        }

        .btn-dark {
            background: #222;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #game-frame {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 5000;
            display: none;
            background: #000;
        }

        #game-frame.active {
            display: block;
        }

        #pull-zone {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            z-index: 9999;
            cursor: pointer;
            pointer-events: none;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(20, 20, 20, 0.98);
            border: 2px solid rgba(255, 0, 0, 0.4);
            border-radius: 12px;
            padding: 30px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
        }

        .modal-content h2 {
            color: #f00;
            margin: 0 0 15px 0;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .modal-content p {
            color: #fff;
            margin: 0 0 25px 0;
            font-size: 14px;
            line-height: 1.6;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            max-width: 150px;
        }

        .modal-btn-proceed {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: #fff;
        }

        .modal-btn-proceed:active {
            transform: scale(0.95);
        }

        .modal-btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal-btn-cancel:active {
            transform: scale(0.95);
        }

        .flash-popup {
            position: fixed;
            right: 12px;
            bottom: 12px;
            z-index: 15000;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 18px rgba(0, 0, 0, 0.8);
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .flash-popup.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .flash-popup button {
            border: none;
            background: linear-gradient(135deg, #ffcc00, #ff8800);
            color: #000;
            font-weight: 800;
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(255, 200, 0, 0.3);
        }

        .flash-popup button:active {
            transform: scale(0.95);
        }

        .flash-popup span {
            font-size: 11px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div id="pull-zone"></div>

<div id="pull-menu">
    <h2>PAUSED</h2>
    <button class="btn btn-red" onclick="exitGame()">EXIT TO MENU</button>
    <button class="btn btn-dark" onclick="toggleMenu()">RESUME GAME</button>
</div>

<div id="desktop-header-modal" class="modal">
    <div class="modal-content">
        <h2>⚠ DESKTOP VERSION</h2>
        <p>Be aware the desktop version requires a keyboard and mouse or trackpad for the majority of games, and the UI may not be readable on phones.</p>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-cancel" onclick="closeDesktopHeaderModal()">CANCEL</button>
            <button class="modal-btn modal-btn-proceed" onclick="proceedToDesktop()">PROCEED</button>
        </div>
    </div>
</div>

<iframe id="game-frame"></iframe>

<div class="ui-layer" id="main-ui">

    <div class="top-bar">
        <div class="gams-bubble-row">
            <div class="header-bubble" onclick="openDesktopHeaderModal()">
                <h1>GAMS</h1>
            </div>
        </div>
        <div class="header-row">
            <div class="search-container">
                <input id="search-input" class="search-input" type="text"
                       placeholder="Search your games here..." oninput="filterGames()">
                <div class="fullscreen-circle" onclick="toggleFS(event)">⛶</div>
            </div>
        </div>
        <div id="library-label" class="library-line">LIBRARY: 0/77 games</div>
    </div>

    <div class="grid" id="grid"></div>
</div>

<div id="flash-popup" class="flash-popup">
    <span>Flash games available</span>
    <button onclick="openFlash()">Flash</button>
</div>

<script>
    function toggleMenu() {
        document.getElementById('pull-menu').classList.toggle('open');
    }

    function openDesktopHeaderModal() {
        document.getElementById('desktop-header-modal').classList.add('active');
    }

    function closeDesktopHeaderModal() {
        document.getElementById('desktop-header-modal').classList.remove('active');
    }

    function proceedToDesktop() {
        window.location.href = 'index-desktop.html';
    }

    function launchGame(url, tileEl) {
        if (tileEl) {
            document.querySelectorAll('.tile.selected').forEach(t => t.classList.remove('selected'));
            tileEl.classList.add('selected');
        }
        document.getElementById('game-frame').src = url;
        document.getElementById('game-frame').classList.add('active');
        document.getElementById('main-ui').classList.add('hidden');
        document.getElementById('pull-menu').classList.remove('open');
    }

    function exitGame() {
        document.getElementById('game-frame').classList.remove('active');
        document.getElementById('game-frame').src = '';
        document.getElementById('main-ui').classList.remove('hidden');
        document.getElementById('pull-menu').classList.remove('open');
    }

    function toggleFS(event) {
        if (event) event.stopPropagation();
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    }

    function openFlash() {
        window.location.href = 'g/g/ruffle/ruffle.html';
    }

    const games = [
        { n: 'Stickman Hook', u: 'g/stickmanhook.html', i: 'stickmanhook.png' },
        { n: 'Drive Mad', u: 'g/g/drivemad/drivemad.html', i: 'drivemad.png' },
        { n: '2048', u: 'g/2048.html', i: '2048.png' },
        { n: 'Cookie Clicker', u: 'g/g/cookie/index.html', i: 'cookieclicker.png' },
        { n: 'Its Raining Boxes', u: 'g/itsrainingboxes.html', i: 'itsrainingboxes.png' },
        { n: 'Stack', u: 'g/stack.html', i: 'stack.png' },
        { n: 'Rolling Forest', u: 'g/rollingforests.html', i: 'rollingforests.png' },
        { n: 'Fluid Simulator', u: 'g/fluidsimulator.html', i: 'fluidsimulator.png' },
        { n: 'Geometry Dash', u: 'g/geometrydash.html', i: 'geometrydash.png' },
        { n: 'Worldle+', u: 'g/wordle.html', i: 'wordle.png' },
        { n: 'Paper IO 2', u: 'g/paperio2.html', i: 'paperio2.png' },
        { n: 'Raft Wars 1', u: 'g/raftwars.html', i: 'raftwars.png' },
        { n: 'Raft Wars 2', u: 'g/raftwars2.html', i: 'raftwars2.html' }
    ];

    const grid = document.getElementById('grid');
    const libraryLabel = document.getElementById('library-label');
    const flashPopup = document.getElementById('flash-popup');
    const TOTAL_GAMES = 77;

    games.forEach((game) => {
        const tile = document.createElement('div');
        tile.className = 'tile';

        const imageWrapper = document.createElement('div');
        imageWrapper.className = 'tile-image-wrapper';

        const img = document.createElement('img');
        img.src = `img/${game.i}`;
        img.alt = game.n;
        img.onerror = function () {
            this.src = 'img/gams-g.png';
        };

        const label = document.createElement('div');
        label.className = 'tile-label';
        label.textContent = game.n;

        imageWrapper.appendChild(img);
        tile.appendChild(imageWrapper);
        tile.appendChild(label);

        tile.dataset.name = game.n.toLowerCase();
        tile.onclick = () => launchGame(game.u, tile);

        grid.appendChild(tile);
    });

    function updateLibraryLabel() {
        const visibleTiles = Array.from(grid.children)
            .filter(el => el.style.display !== 'none');
        const count = visibleTiles.length;
        libraryLabel.textContent = `LIBRARY: ${count}/${TOTAL_GAMES} games`;
    }

    function filterGames() {
        const q = document.getElementById('search-input').value.trim().toLowerCase();
        Array.from(grid.children).forEach(tile => {
            const name = tile.dataset.name || '';
            tile.style.display = name.includes(q) ? '' : 'none';
        });
        updateLibraryLabel();
    }

    updateLibraryLabel();

    grid.addEventListener('scroll', () => {
        const threshold = 80;
        const distanceFromBottom = grid.scrollHeight - grid.scrollTop - grid.clientHeight;
        if (distanceFromBottom <= threshold) {
            flashPopup.classList.add('visible');
        } else {
            flashPopup.classList.remove('visible');
        }
    });
</script>

</body>
</html>
