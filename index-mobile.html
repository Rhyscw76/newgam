<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gams Mobile</title>
    <link rel="icon" id="tab-icon" href="img/gams-g.png">
    <style>
        :root { --p: #f00; --bg: rgba(10,10,10,0.95); }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
        
        html, body { 
            background: #000; height: 100%; width: 100%; 
            overflow: hidden; overscroll-behavior: none; font-family: 'Segoe UI', sans-serif;
        }

        /* THE PULL MENU - Higher z-index than everything */
        #pull-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: auto;
            background: var(--bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 3px solid var(--p);
            z-index: 999999;
            transform: translateY(-100%); /* Hidden by default */
            transition: transform 0.1s linear; /* Fast response during drag */
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            text-align: center;
        }

        #pull-menu.snapping {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pull-handle {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }

        /* INVISIBLE TRIGGER AREA */
        #pull-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            z-index: 1000000; /* Highest layer */
            background: transparent;
        }

        /* CONTAINER FOR SITE & IFRAME */
        .mobile-container {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('ibg.svg') center/cover no-repeat;
            z-index: 10;
        }

        #game-frame {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
            display: none;
            z-index: 50;
        }

        /* UI ELEMENTS */
        .mobile-header { padding: 15px; border-bottom: 2px solid var(--p); background: rgba(0,0,0,0.8); }
        .mobile-tabs { display: flex; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .mobile-tab { flex: 1; padding: 15px; text-align: center; font-weight: bold; font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .mobile-tab.active { color: #fff; border-bottom: 3px solid var(--p); }

        .mobile-search { padding: 10px; }
        .mobile-search input { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: #fff; font-size: 16px; }

        .mobile-game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; overflow-y: auto; }
        .mobile-tile { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 15px; padding: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .mobile-tile img { width: 100%; border-radius: 10px; margin-bottom: 5px; }

        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; cursor: pointer; }
        .btn-red { background: var(--p); color: #fff; }
        .btn-dark { background: #222; color: #fff; }

        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>

    <div id="pull-trigger"></div>

    <div id="pull-menu">
        <h2 style="color:var(--p)">GAME PAUSED</h2>
        <button class="btn btn-red" onclick="leaveGame()">🚪 Leave Game</button>
        <button class="btn btn-dark" onclick="location.reload()">🔄 Restart App</button>
        <button class="btn btn-dark" onclick="closeMenu()">▶️ Resume</button>
        <div class="pull-handle"></div>
    </div>

    <iframe id="game-frame"></iframe>

    <div class="mobile-container" id="main-ui">
        <div class="mobile-header"><h1>GAMS</h1></div>
        <div class="mobile-tabs">
            <div class="mobile-tab active" onclick="switchTab('games', this)">Games</div>
            <div class="mobile-tab" onclick="switchTab('eaglercraft', this)">Eaglercraft</div>
        </div>
        
        <div class="mobile-search" id="search-container">
            <input type="text" placeholder="Search games..." oninput="search(this.value)">
        </div>

        <div id="games" class="section active">
            <div class="mobile-game-grid" id="grid"></div>
        </div>

        <div id="eaglercraft" class="section">
            <div style="padding: 40px;">
                <div class="mobile-tile" style="padding: 30px;">
                    <h3>Eaglercraft 1.8.8</h3>
                    <button class="btn btn-red" style="margin-top:20px" onclick="loadGame('g/aminecraftfolder/wasm_gc_jspi_offline/eaglercraft_wasm_gc_jspi_offline.html')">Launch</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // PULL LOGIC
        const menu = document.getElementById('pull-menu');
        const trigger = document.getElementById('pull-trigger');
        let startY = 0;
        let currentY = 0;
        let isDragging = false;

        document.addEventListener('touchstart', e => {
            if (e.touches[0].clientY < 60) {
                startY = e.touches[0].clientY;
                isDragging = true;
                menu.classList.remove('snapping');
            }
        });

        document.addEventListener('touchmove', e => {
            if (!isDragging) return;
            currentY = e.touches[0].clientY - startY;
            
            // Allow pulling down up to 300px
            if (currentY > 0 && currentY < 350) {
                let progress = -100 + (currentY / 3); 
                menu.style.transform = `translateY(${progress}%)`;
            }
        });

        document.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            menu.classList.add('snapping');
            
            if (currentY > 120) {
                menu.style.transform = `translateY(0%)`; // Snap Open
            } else {
                menu.style.transform = `translateY(-100%)`; // Snap Closed
            }
            currentY = 0;
        });

        function closeMenu() {
            menu.classList.add('snapping');
            menu.style.transform = `translateY(-100%)`;
        }

        // GAME LOGIC
        function loadGame(url) {
            document.getElementById('game-frame').src = url;
            document.getElementById('game-frame').style.display = 'block';
            document.getElementById('main-ui').style.display = 'none';
            closeMenu();
        }

        function leaveGame() {
            document.getElementById('game-frame').src = '';
            document.getElementById('game-frame').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            closeMenu();
        }

        // TABS & SEARCH
        function switchTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            document.getElementById('search-container').style.display = (id === 'games') ? 'block' : 'none';
        }

        function search(q) {
            const tiles = document.querySelectorAll('.mobile-tile');
            tiles.forEach(t => {
                t.style.display = t.innerText.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
            });
        }

        // INIT
        const gamesList = [
            { n: 'Stickman Hook', u: 'g/stickmanhook.html', i: 'stickmanhook.png' },
            { n: 'Drive Mad', u: 'g/g/drivemad/drivemad.html', i: 'drivemad.png' },
            { n: '2048', u: 'g/2048.html', i: '2048.png' },
            { n: 'Cookie Clicker', u: 'g/g/cookie/index.html', i: 'cookieclicker.png' },
            { n: 'Geometry Dash', u: 'g/geometrydash.html', i: 'geometrydash.png' }
        ];

        const grid = document.getElementById('grid');
        gamesList.forEach(g => {
            const div = document.createElement('div');
            div.className = 'mobile-tile';
            div.innerHTML = `<img src="img/${g.i}"><div>${g.n}</div>`;
            div.onclick = () => loadGame(g.u);
            grid.appendChild(div);
        });
    </script>
</body>
</html>
