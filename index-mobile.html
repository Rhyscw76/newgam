<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gams Mobile</title>
    <style>
        /* THEME VARIABLES */
        :root { 
            --p: #f00; 
            --bg-hud: rgba(20, 20, 20, 0.95); 
            --txt: #ffffff;
            --tile-bg: rgba(255, 255, 255, 0.08);
            --tile-brd: rgba(255, 255, 255, 0.15);
            --overlay-color: rgba(0, 0, 0, 0.4);
            --ui-bg: transparent; /* Essential for SVG visibility */
        }
        
        /* TRUE WHITE MODE */
        body.light-mode {
            --p: #f00; 
            --bg-hud: rgba(255, 255, 255, 0.98);
            --txt: #111111;
            --tile-bg: rgba(0, 0, 0, 0.05);
            --tile-brd: rgba(0, 0, 0, 0.1);
            --overlay-color: rgba(255, 255, 255, 0.85); /* Makes background look white while keeping SVG visible */
            --ui-bg: #ffffff;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
        
        html, body { 
            height: 100%; width: 100%; 
            overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            color: var(--txt);
            background-color: #000; /* Fallback */
        }

        /* FIXED WALLPAPER RENDER - Layer -2 */
        .wallpaper-container {
            position: fixed;
            inset: 0;
            background-image: url('ibg.svg') !important;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }

        /* DYNAMIC OVERLAY - Layer -1 */
        .theme-overlay {
            position: fixed;
            inset: 0;
            background: var(--overlay-color);
            z-index: -1;
            transition: background 0.3s ease;
        }

        /* PULL-DOWN MENU (Flush with top) */
        #pull-menu {
            position: fixed; top: 0; left: 0; width: 100%;
            background: var(--bg-hud);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 3px solid var(--p);
            z-index: 10000;
            transform: translateY(-101%);
            will-change: transform;
            padding: calc(env(safe-area-inset-top) + 15px) 20px 30px;
            transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            text-align: center;
            box-shadow: 0 5px 30px rgba(0,0,0,0.3);
        }

        /* MAIN UI */
        .app-container {
            position: relative; height: 100%; width: 100%;
            display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top);
            background: transparent;
        }

        .header { 
            padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--p);
            background: rgba(0,0,0,0.05);
        }

        .scroll-area {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 15px;
        }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* TILES */
        .tile { 
            background: var(--tile-bg); 
            border: 1px solid var(--tile-brd);
            border-radius: 20px; padding: 12px; text-align: center;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .tile img { width: 100%; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .tile span { font-weight: 700; font-size: 0.9rem; }

        /* BUTTONS */
        .btn { 
            width: 100%; padding: 16px; border-radius: 15px; border: none; 
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            margin-top: 10px;
        }
        .btn-red { background: var(--p); color: #fff; }
        .btn-outline { background: transparent; color: var(--txt); border: 2px solid var(--p); }

        #game-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; z-index: 5000; display: none; background: #000; }
        #pull-zone { position: fixed; top: 0; left: 0; width: 100%; height: 50px; z-index: 100000; }
    </style>
</head>
<body>

    <div class="wallpaper-container"></div>
    <div class="theme-overlay"></div>

    <div id="pull-zone"></div>

    <div id="pull-menu">
        <h2 style="color:var(--p); margin-bottom: 15px;">GAME PAUSED</h2>
        <button class="btn btn-red" onclick="exitGame()">🚪 EXIT TO MENU</button>
        <button class="btn btn-outline" onclick="toggleTheme()">🌓 TOGGLE THEME</button>
        <button class="btn" style="background:#888; color:#fff;" onclick="closeMenu()">▶️ RESUME</button>
    </div>

    <iframe id="game-frame"></iframe>

    <div class="app-container" id="ui-main">
        <div class="header">
            <h1 style="font-weight: 900; letter-spacing: 3px;">GAMS</h1>
            <button onclick="openMenu()" style="background:none; border:none; font-size:1.6rem; color:var(--txt);">⚙️</button>
        </div>

        <div class="scroll-area">
            <div class="game-grid" id="grid"></div>
        </div>
    </div>

    <script>
        const menu = document.getElementById('pull-menu');
        const pullZone = document.getElementById('pull-zone');
        let startY = 0;

        // THEME LOGIC
        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('gams_pref_theme', isLight ? 'light' : 'dark');
        }

        // AUTO-LOAD PREFERENCE
        if (localStorage.getItem('gams_pref_theme') === 'light') {
            document.body.classList.add('light-mode');
        }

        // PULL GESTURE
        pullZone.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
        pullZone.addEventListener('touchmove', e => {
            if (e.touches[0].clientY - startY > 40) openMenu();
        });

        function openMenu() { menu.style.transform = 'translateY(0)'; }
        function closeMenu() { menu.style.transform = 'translateY(-101%)'; }

        function launchGame(url) {
            const f = document.getElementById('game-frame');
            f.src = url; f.style.display = 'block';
            document.getElementById('ui-main').style.display = 'none';
            closeMenu();
        }

        function exitGame() {
            const f = document.getElementById('game-frame');
            f.src = ''; f.style.display = 'none';
            document.getElementById('ui-main').style.display = 'flex';
            closeMenu();
        }

        // DATA
        const gamesList = [
            { n: 'Stickman Hook', u: 'g/stickmanhook.html', i: 'stickmanhook.png' },
            { n: 'Drive Mad', u: 'g/g/drivemad/drivemad.html', i: 'drivemad.png' },
            { n: '2048', u: 'g/2048.html', i: '2048.png' },
            { n: 'Cookie Clicker', u: 'g/g/cookie/index.html', i: 'cookieclicker.png' },
            { n: 'Geometry Dash', u: 'g/geometrydash.html', i: 'geometrydash.png' },
            { n: 'Paper IO 2', u: 'g/paperio2.html', i: 'paperio2.png' },
            { n: 'Wordle+', u: 'g/wordle.html', i: 'wordle.png' },
            { n: 'Raft Wars', u: 'g/raftwars.html', i: 'raftwars.png' }
        ];

        const grid = document.getElementById('grid');
        gamesList.forEach(g => {
            const d = document.createElement('div');
            d.className = 'tile';
            d.innerHTML = `<img src="img/${g.i}" onerror="this.src='img/gams-g.png'"><span>${g.n}</span>`;
            d.onclick = () => launchGame(g.u);
            grid.appendChild(d);
        });
    </script>
</body>
</html>
