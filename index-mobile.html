<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gams Mobile</title>
    <link rel="icon" id="tab-icon" href="img/gams-g.png">
    <style>
        :root { --p: #f00; --bg: rgba(15,15,15,0.98); }
        
        * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
        
        html, body { 
            background: #000; height: 100%; width: 100%; 
            overflow: hidden; overscroll-behavior: none; 
            font-family: 'Segoe UI', sans-serif; color: #fff;
        }

        /* SVG BACKGROUND RENDER FIX - Bleeds into safe areas */
        .bg-layer {
            position: fixed;
            inset: 0;
            background: url('ibg.svg') center/cover no-repeat;
            z-index: 1;
        }
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 2;
        }

        /* GESTURE TRIGGER */
        #pull-trigger {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            z-index: 1000000; background: transparent; touch-action: none;
        }

        /* HUD MENU with Reload Icon and Safe Area Padding */
        #pull-menu {
            position: fixed; top: 0; left: 0; width: 100%;
            background: var(--bg);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-bottom: 3px solid var(--p);
            z-index: 999999;
            transform: translateY(-100%);
            will-change: transform;
            padding: calc(env(safe-area-inset-top) + 20px) 20px 35px;
            display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9); text-align: center;
        }

        .menu-reload-btn {
            position: absolute;
            top: calc(env(safe-area-inset-top) + 10px);
            right: 20px;
            font-size: 1.8rem; background: none; border: none; color: #fff;
            opacity: 0.7; cursor: pointer; padding: 10px;
        }
        .menu-reload-btn:active { transform: rotate(90deg); transition: 0.2s; opacity: 1; }

        .pull-handle {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            width: 50px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px;
        }

        /* MAIN UI CONTAINER */
        .mobile-container {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            z-index: 10;
            padding-top: env(safe-area-inset-top);
        }

        #game-frame {
            position: fixed; inset: 0; width: 100%; height: 100%;
            border: none; background: #000; display: none; z-index: 50;
        }

        .mobile-header { 
            padding: 15px; 
            border-bottom: 3px solid var(--p); 
            flex-shrink: 0; 
            background: rgba(0,0,0,0.7); 
        }
        .mobile-header h1 { font-size: 1.4rem; letter-spacing: 2px; text-align: center; font-weight: 900; }

        .mobile-search { padding: 12px; flex-shrink: 0; }
        .mobile-search input { 
            width: 100%; padding: 14px; 
            background: rgba(255,255,255,0.1); 
            border: 1.5px solid rgba(255,255,255,0.1); 
            border-radius: 12px; color: #fff; font-size: 16px; 
        }

        .mobile-content { 
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            padding-bottom: 50px;
        }
        .mobile-game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        
        .mobile-tile { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border-radius: 18px; padding: 10px; 
            text-align: center; border: 1.5px solid rgba(255,255,255,0.1); 
        }
        .mobile-tile img { width: 100%; border-radius: 14px; margin-bottom: 8px; }
        .mobile-tile-name { font-size: 0.8rem; font-weight: 700; color: #fff; }

        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 900; text-transform: uppercase; font-size: 0.9rem; }
        .btn-red { background: var(--p); color: #fff; }
        .btn-dark { background: #1a1a1a; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="bg-overlay"></div>

    <div id="pull-trigger"></div>

    <div id="pull-menu">
        <button class="menu-reload-btn" onclick="location.reload()">↻</button>
        <h2 style="color:var(--p); margin-bottom: 5px;">PAUSED</h2>
        <button class="btn btn-red" onclick="leaveGame()">🚪 EXIT GAME</button>
        <button class="btn btn-dark" onclick="closeMenu()">▶️ RESUME</button>
        <div class="pull-handle"></div>
    </div>

    <iframe id="game-frame"></iframe>

    <div class="mobile-container" id="main-ui">
        <div class="mobile-header">
            <h1>GAMS</h1>
        </div>
        
        <div class="mobile-search">
            <input type="text" placeholder="Search games..." oninput="search(this.value)">
        </div>

        <div class="mobile-content">
            <div class="mobile-game-grid" id="grid"></div>
        </div>
    </div>

    <script>
        const menu = document.getElementById('pull-menu');
        const trigger = document.getElementById('pull-trigger');
        let startY = 0; let isDragging = false;

        trigger.addEventListener('touchstart', e => {
            startY = e.touches[0].clientY; isDragging = true;
            menu.style.transition = 'none';
        }, {passive: true});

        document.addEventListener('touchmove', e => {
            if (!isDragging) return;
            const y = e.touches[0].clientY;
            const pullDistance = Math.max(0, Math.min(y - startY, menu.offsetHeight + 40));
            const percentage = -100 + (pullDistance / menu.offsetHeight * 100);
            window.requestAnimationFrame(() => { menu.style.transform = `translateY(${percentage}%)`; });
        }, {passive: true});

        document.addEventListener('touchend', e => {
            if (!isDragging) return;
            isDragging = false;
            menu.style.transition = 'transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.1)';
            const endY = e.changedTouches[0].clientY;
            if (endY - startY > 100) { menu.style.transform = 'translateY(0%)'; } 
            else { menu.style.transform = 'translateY(-100%)'; }
        });

        function closeMenu() { 
            menu.style.transition = 'transform 0.3s ease'; 
            menu.style.transform = 'translateY(-100%)'; 
        }

        function loadGame(url) {
            const frame = document.getElementById('game-frame');
            frame.src = url;
            frame.style.display = 'block';
            document.getElementById('main-ui').style.display = 'none';
            closeMenu();
        }

        function leaveGame() {
            const frame = document.getElementById('game-frame');
            frame.src = '';
            frame.style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            closeMenu();
        }

        function search(q) {
            const tiles = document.querySelectorAll('.mobile-tile');
            tiles.forEach(t => {
                t.style.display = t.innerText.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
            });
        }

        // VERIFIED WORKING MOBILE GAMES LIST
        const gamesList = [
            { n: 'Stickman Hook', u: 'g/stickmanhook.html', i: 'stickmanhook.png' },
            { n: 'Drive Mad', u: 'g/g/drivemad/drivemad.html', i: 'drivemad.png' },
            { n: '2048', u: 'g/2048.html', i: '2048.png' },
            { n: 'Cookie Clicker', u: 'g/g/cookie/index.html', i: 'cookieclicker.png' },
            { n: 'Its Raining Boxes', u: 'g/itsrainingboxes.html', i: 'itsrainingboxes.png' },
            { n: 'Stack', u: 'g/stack.html', i: 'stack.png' },
            { n: 'Rolling Forest', u: 'g/rollingforests.html', i: 'rollingforests.png' },
            { n: 'Fluid Simulator', u: 'g/fluidsimulator.html', i: 'fluidsimulator.png' },
            { n: 'Geometry Dash', u: 'g/geometrydash.html', i: 'geometrydash.png' },
            { n: 'Wordle+', u: 'g/wordle.html', i: 'wordle.png' },
            { n: 'Paper IO 2', u: 'g/paperio2.html', i: 'paperio2.png' },
            { n: 'Raft Wars 1', u: 'g/raftwars.html', i: 'raftwars.png' },
            { n: 'Raft Wars 2', u: 'g/raftwars2.html', i: 'raftwars2.png' }
        ];

        const grid = document.getElementById('grid');
        gamesList.forEach(g => {
            const div = document.createElement('div');
            div.className = 'mobile-tile';
            div.innerHTML = `<img src="img/${g.i}" onerror="this.src='img/gams-g.png'"><div class="mobile-tile-name">${g.n}</div>`;
            div.onclick = () => {
                if (navigator.vibrate) navigator.vibrate(10);
                loadGame(g.u);
            };
            grid.appendChild(div);
        });
    </script>
</body>
</html>
