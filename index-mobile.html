<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gams Mobile</title>
    <link rel="icon" id="tab-icon" href="img/gams-g.png">
    <style>
        :root { --p: #f00; --bg: rgba(10,10,10,0.98); }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
        
        html, body { 
            background: #000; height: 100%; width: 100%; 
            overflow: hidden; overscroll-behavior: none; font-family: 'Segoe UI', sans-serif;
        }

        /* THE PULL MENU */
        #pull-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 3px solid var(--p);
            z-index: 999999;
            transform: translateY(-100%);
            will-change: transform; /* Performance boost */
            padding: 50px 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            text-align: center;
        }

        .pull-handle {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        /* INVISIBLE TRIGGER AREA */
        #pull-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            z-index: 1000000;
            background: transparent;
            touch-action: none; /* CRITICAL: Stops browser stutter/refresh */
        }

        .mobile-container {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('ibg.svg') center/cover no-repeat;
            z-index: 10;
        }

        #game-frame {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
            display: none;
            z-index: 50;
        }

        /* UI ELEMENTS */
        .mobile-header { padding: 18px; border-bottom: 2px solid var(--p); background: rgba(0,0,0,0.8); text-align: center; }
        .mobile-header h1 { font-size: 1.4rem; letter-spacing: 3px; font-weight: 900; }
        
        .mobile-tabs { display: flex; background: rgba(0,0,0,0.6); }
        .mobile-tab { flex: 1; padding: 15px; text-align: center; font-weight: 800; font-size: 0.75rem; color: #666; text-transform: uppercase; border-bottom: 2px solid transparent; }
        .mobile-tab.active { color: #fff; border-bottom-color: var(--p); background: rgba(255,0,0,0.05); }

        .mobile-search { padding: 12px; }
        .mobile-search input { 
            width: 100%; padding: 14px; 
            background: rgba(255,255,255,0.07); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; color: #fff; font-size: 16px; 
        }

        .mobile-game-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; 
            padding: 12px; overflow-y: auto; flex: 1;
        }
        .mobile-tile { 
            background: rgba(255,255,255,0.03); 
            backdrop-filter: blur(10px); 
            border-radius: 18px; padding: 10px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.08); 
        }
        .mobile-tile img { width: 100%; border-radius: 14px; margin-bottom: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .mobile-tile div { font-size: 0.8rem; font-weight: 600; }

        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; font-size: 0.9rem; }
        .btn-red { background: var(--p); color: #fff; box-shadow: 0 4px 15px rgba(255,0,0,0.3); }
        .btn-dark { background: #1a1a1a; color: #fff; border: 1px solid rgba(255,255,255,0.1); }

        .section { display: none; height: 100%; }
        .section.active { display: block; }
    </style>
</head>
<body>

    <div id="pull-trigger"></div>

    <div id="pull-menu">
        <h2 style="color:var(--p); margin-bottom: 5px;">PAUSED</h2>
        <button class="btn btn-red" onclick="leaveGame()">🚪 Leave Game</button>
        <button class="btn btn-dark" onclick="location.reload()">🔄 Restart App</button>
        <button class="btn btn-dark" onclick="closeMenu()">▶️ Resume</button>
        <div class="pull-handle"></div>
    </div>

    <iframe id="game-frame"></iframe>

    <div class="mobile-container" id="main-ui">
        <div class="mobile-header"><h1>GAMS</h1></div>
        <div class="mobile-tabs">
            <div class="mobile-tab active" onclick="switchTab('games', this)">Games</div>
            <div class="mobile-tab" onclick="switchTab('eaglercraft', this)">Eaglercraft</div>
        </div>
        
        <div class="mobile-search" id="search-container">
            <input type="text" placeholder="Search games..." oninput="search(this.value)">
        </div>

        <div id="games" class="section active">
            <div class="mobile-game-grid" id="grid"></div>
        </div>

        <div id="eaglercraft" class="section">
            <div style="padding: 30px; display: flex; align-items: center; justify-content: center; height: 80%;">
                <div class="mobile-tile" style="padding: 40px; width: 100%;">
                    <h3 style="margin-bottom:20px">Minecraft 1.8.8</h3>
                    <button class="btn btn-red" onclick="loadGame('g/aminecraftfolder/wasm_gc_jspi_offline/eaglercraft_wasm_gc_jspi_offline.html')">Launch Game</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const menu = document.getElementById('pull-menu');
        const trigger = document.getElementById('pull-trigger');
        let startY = 0;
        let isDragging = false;
        let currentTranslate = -100;

        // Smooth Animation Frame logic
        function updateMenuPos(y) {
            if (!isDragging) return;
            const height = menu.offsetHeight;
            const pullDistance = Math.max(0, Math.min(y - startY, height + 50));
            const percentage = -100 + (pullDistance / height * 100);
            menu.style.transform = `translateY(${percentage}%)`;
            requestAnimationFrame(() => {});
        }

        trigger.addEventListener('touchstart', e => {
            startY = e.touches[0].clientY;
            isDragging = true;
            menu.style.transition = 'none'; // Disable transition for raw tracking
        }, {passive: true});

        document.addEventListener('touchmove', e => {
            if (!isDragging) return;
            const y = e.touches[0].clientY;
            updateMenuPos(y);
        }, {passive: true});

        document.addEventListener('touchend', e => {
            if (!isDragging) return;
            isDragging = false;
            menu.style.transition = 'transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.1)';
            
            const endY = e.changedTouches[0].clientY;
            if (endY - startY > 100) {
                menu.style.transform = 'translateY(0%)';
            } else {
                menu.style.transform = 'translateY(-100%)';
            }
        });

        function closeMenu() {
            menu.style.transition = 'transform 0.3s ease';
            menu.style.transform = 'translateY(-100%)';
        }

        function loadGame(url) {
            const frame = document.getElementById('game-frame');
            frame.src = url;
            frame.style.display = 'block';
            document.getElementById('main-ui').style.display = 'none';
            closeMenu();
        }

        function leaveGame() {
            const frame = document.getElementById('game-frame');
            frame.src = '';
            frame.style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            closeMenu();
        }

        function switchTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            document.getElementById('search-container').style.display = (id === 'games') ? 'block' : 'none';
        }

        function search(q) {
            const tiles = document.querySelectorAll('.mobile-tile');
            tiles.forEach(t => {
                t.style.display = t.innerText.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
            });
        }

        const gamesList = [
            { n: 'Stickman Hook', u: 'g/stickmanhook.html', i: 'stickmanhook.png' },
            { n: 'Drive Mad', u: 'g/g/drivemad/drivemad.html', i: 'drivemad.png' },
            { n: '2048', u: 'g/2048.html', i: '2048.png' },
            { n: 'Cookie Clicker', u: 'g/g/cookie/index.html', i: 'cookieclicker.png' },
            { n: 'Geometry Dash', u: 'g/geometrydash.html', i: 'geometrydash.png' },
            { n: 'Paper IO 2', u: 'g/paperio2.html', i: 'paperio2.png' }
        ];

        const grid = document.getElementById('grid');
        gamesList.forEach(g => {
            const div = document.createElement('div');
            div.className = 'mobile-tile';
            div.innerHTML = `<img src="img/${g.i}" onerror="this.src='img/gams-g.png'"><div>${g.n}</div>`;
            div.onclick = () => loadGame(g.u);
            grid.appendChild(div);
        });
    </script>
</body>
</html>
