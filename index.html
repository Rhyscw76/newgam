<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gams - Loading...</title>
    <script>
        // Detect device type and route accordingly
        const isMobileUA = /iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini|Windows Phone/i.test(navigator.userAgent);
        
        if (isMobileUA) {
            // Load mobile version
            window.location.href = 'index-mobile.html';
        } else {
            // Load desktop version (original)
            window.location.href = 'index-desktop.html';
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
