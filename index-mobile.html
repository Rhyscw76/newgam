<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gams Mobile</title>
    <link rel="icon" id="tab-icon" href="img/gams-g.png">
    <style>
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        :root { --p: #f00; --g: rgba(15,15,15,.8); --b: rgba(255,255,255,0.2); --glow: 0 0 25px rgba(255,0,0,.4); }
        * { margin:0; padding:0; box-sizing:border-box; outline:0; -webkit-user-select:none; user-select:none; scrollbar-width:none; }
        ::-webkit-scrollbar { display:none; }
        html, body { color:#fff; font-family:'Segoe UI',sans-serif; background:#000; height:100%; width:100%; overflow:hidden; }
        
        .mobile-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            /* UPDATED: Lighter overlay (0.4 instead of 0.9) makes ibg.svg much more visible */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('ibg.svg') center/cover no-repeat;
            overflow: hidden;
            z-index: 100000;
            animation: fadeIn 0.3s ease-in;
        }

        .mobile-header {
            padding: 14px 16px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-bottom: 3px solid var(--p);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(255,0,0,0.2);
        }

        .mobile-header h1 {
            font-size: 1.3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,0,0,0.5);
        }

        .mobile-header-buttons { display: flex; gap: 6px; }

        .mobile-btn-small {
            padding: 8px 12px;
            background: rgba(255,0,0,0.2);
            border: 1.5px solid var(--p);
            border-radius: 8px;
            color: #fff;
            font-weight: 700;
            font-size: 0.6rem;
            text-transform: uppercase;
        }

        .mobile-tabs {
            display: flex;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--b);
            flex-shrink: 0;
        }

        .mobile-tab {
            flex: 1;
            padding: 14px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            color: rgba(255,255,255,0.6);
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .mobile-tab.active {
            color: #fff;
            border-bottom-color: var(--p);
            background: rgba(255,0,0,0.1);
        }

        .mobile-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* SECTION FIX: Strictly hidden unless active */
        .mobile-section {
            display: none; 
            flex-direction: column;
            min-height: 100%;
            animation: slideIn 0.3s ease-out;
        }
        .mobile-section.active { display: flex !important; }

        .mobile-game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 14px;
        }

        /* TILE VISIBILITY: Higher transparency (0.4) and blur makes bg visible through tiles */
        .mobile-tile {
            background: rgba(20, 20, 20, 0.4); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            transition: transform 0.2s;
        }

        .mobile-tile:active { transform: scale(0.95); background: rgba(255,0,0,0.2); }

        .mobile-tile img {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .mobile-tile-name { font-size: 0.75rem; font-weight: 700; color: #fff; }

        .mobile-search { padding: 12px; }
        .mobile-search input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid var(--b);
            border-radius: 10px;
            color: #fff;
        }

        /* MODAL STYLES */
        .mobile-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 500001;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .mobile-modal.active { display: flex; }
        .mobile-modal-content {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--p);
            width: 100%;
            max-width: 320px;
            text-align: center;
        }
        .modal-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
        }
        .btn-red { background: var(--p); color: #fff; }
        .btn-dark { background: #333; color: #fff; }

        .mobile-eaglercraft-section { justify-content: center; align-items: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="mobile-container">
        <div class="mobile-header">
            <h1>GAMS</h1>
            <div class="mobile-header-buttons">
                <button class="mobile-btn-small" onclick="mobileTglModal('pc-modal')">💻 PC</button>
                <button class="mobile-btn-small" onclick="mobileTglModal('settings-modal')">⚙️</button>
            </div>
        </div>

        <div class="mobile-tabs">
            <button class="mobile-tab active" onclick="mobileChangeTab('games', this)">Games</button>
            <button class="mobile-tab" onclick="mobileChangeTab('eaglercraft', this)">Eaglercraft</button>
        </div>

        <div class="mobile-search" id="search-bar">
            <input type="text" id="mobile-search" placeholder="Search for a game..." oninput="mobileDoSearch()">
        </div>

        <div class="mobile-content">
            <div id="mobile-games-section" class="mobile-section active">
                <div id="mobile-game-grid" class="mobile-game-grid"></div>
            </div>

            <div id="mobile-eaglercraft-section" class="mobile-section mobile-eaglercraft-section">
                <div class="mobile-tile" style="padding: 40px; width: 80%;">
                    <h2 style="margin-bottom: 10px;">MINECRAFT</h2>
                    <p style="font-size: 0.8rem; margin-bottom: 20px; opacity: 0.7;">Eaglercraft 1.8.8</p>
                    <button class="modal-btn btn-red" onclick="window.location.href='g/aminecraftfolder/wasm_gc_jspi_offline/eaglercraft_wasm_gc_jspi_offline.html'">Launch</button>
                </div>
            </div>
        </div>
    </div>

    <div id="pc-modal" class="mobile-modal">
        <div class="mobile-modal-content">
            <h2 style="color:var(--p)">Switch to PC?</h2>
            <p style="margin: 15px 0; font-size: 0.85rem; opacity: 0.8;">The PC version is not optimized for small touch screens.</p>
            <button class="modal-btn btn-red" onclick="window.location.href='index-desktop.html'">Open PC Version</button>
            <button class="modal-btn btn-dark" onclick="mobileTglModal('pc-modal')">Stay on Mobile</button>
        </div>
    </div>

    <div id="settings-modal" class="mobile-modal">
        <div class="mobile-modal-content">
            <h2>Settings</h2>
            <button class="modal-btn btn-dark" onclick="location.reload()">🔄 Refresh App</button>
            <button class="modal-btn btn-red" onclick="mobileTglModal('settings-modal')">Close</button>
        </div>
    </div>

    <script>
        function initMobileVersion() {
            const games = [
                { name: 'Stickman Hook', url: 'g/stickmanhook.html', img: 'stickmanhook.png' },
                { name: 'Drive Mad', url: 'g/g/drivemad/drivemad.html', img: 'drivemad.png' },
                { name: '2048', url: 'g/2048.html', img: '2048.png' },
                { name: 'Cookie Clicker', url: 'g/g/cookie/index.html', img: 'cookieclicker.png' },
                { name: 'Its Raining Boxes', url: 'g/itsrainingboxes.html', img: 'itsrainingboxes.png' },
                { name: 'Stack', url: 'g/stack.html', img: 'stack.png' },
                { name: 'Rolling Forests', url: 'g/rollingforests.html', img: 'rollingforests.png' },
                { name: 'Fluid Simulator', url: 'g/fluidsimulator.html', img: 'fluidsimulator.png' },
                { name: 'Geometry Dash', url: 'g/geometrydash.html', img: 'geometrydash.png' },
                { name: 'Wordle', url: 'g/wordle.html', img: 'wordle.png' },
                { name: 'Paper IO 2', url: 'g/paperio2.html', img: 'paperio2.png' },
                { name: 'Raft Wars', url: 'g/raftwars.html', img: 'raftwars.png' }
            ];

            const grid = document.getElementById('mobile-game-grid');
            grid.innerHTML = ''; 
            games.forEach((game) => {
                const tile = document.createElement('div');
                tile.className = 'mobile-tile';
                
                const img = document.createElement('img');
                img.src = `img/${game.img}`;
                img.onerror = () => { img.src = 'img/gams-g.png'; }; // Fallback image
                
                const name = document.createElement('div');
                name.className = 'mobile-tile-name';
                name.textContent = game.name;
                
                tile.appendChild(img);
                tile.appendChild(name);
                tile.onclick = () => { window.location.href = game.url; };
                grid.appendChild(tile);
            });
        }

        function mobileChangeTab(tab, btn) {
            document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.mobile-section').forEach(s => s.classList.remove('active'));
            
            btn.classList.add('active');
            document.getElementById(`mobile-${tab}-section`).classList.add('active');
            
            // Hide search bar if on Eaglercraft
            document.getElementById('search-bar').style.display = (tab === 'eaglercraft') ? 'none' : 'block';
        }

        function mobileDoSearch() {
            const q = document.getElementById('mobile-search').value.toLowerCase();
            document.querySelectorAll('.mobile-tile').forEach(tile => {
                const name = tile.querySelector('.mobile-tile-name').textContent.toLowerCase();
                tile.style.display = name.includes(q) ? '' : 'none';
            });
        }

        function mobileTglModal(id) {
            document.getElementById(id).classList.toggle('active');
        }

        window.onload = initMobileVersion;
    </script>
</body>
</html>
