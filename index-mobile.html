<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gams Mobile</title>
    <style>
        :root { 
            --p: #f00; 
            --txt: #fff;
            --tile: rgba(255, 255, 255, 0.08);
            --brd: rgba(255, 255, 255, 0.15);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
        
        /* THE FIX: Body must be transparent to see the SVG fixed behind it */
        html, body { 
            height: 100%; width: 100%; 
            overflow: hidden; font-family: sans-serif; 
            color: var(--txt);
            background-color: #000; 
        }

        /* IBG.SVG IMPLEMENTATION */
        .wallpaper {
            position: fixed;
            inset: 0;
            background: url('ibg.svg') center/cover no-repeat !important;
            z-index: 1; /* Lowest Layer */
        }

        /* Darkening overlay so you can see the text over the SVG */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2;
        }

        /* PULL-DOWN MENU (No Gap) */
        #pull-menu {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 3px solid var(--p);
            z-index: 10000;
            transform: translateY(-101%);
            padding: calc(env(safe-area-inset-top) + 15px) 20px 30px;
            transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            text-align: center;
        }

        /* MAIN UI */
        .app-container {
            position: relative; height: 100%; width: 100%;
            display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top);
            z-index: 10; /* Above wallpaper */
            background: transparent;
        }

        .header { 
            padding: 15px 20px; 
            display: flex; justify-content: center; align-items: center;
            border-bottom: 3px solid var(--p);
            background: rgba(0,0,0,0.3);
        }
        .header h1 { font-weight: 900; letter-spacing: 4px; }

        .scroll-area {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 15px;
            background: transparent;
        }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .tile { 
            background: var(--tile); 
            border: 1px solid var(--brd);
            border-radius: 20px; padding: 12px; text-align: center;
            backdrop-filter: blur(10px);
        }
        .tile img { width: 100%; border-radius: 15px; margin-bottom: 8px; }
        .tile span { font-weight: bold; font-size: 0.85rem; }

        /* BUTTONS */
        .btn { 
            width: 100%; padding: 16px; border-radius: 15px; border: none; 
            font-weight: 800; text-transform: uppercase; margin-top: 10px;
        }
        .btn-red { background: var(--p); color: #fff; }

        #game-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; z-index: 5000; display: none; background: #000; }
        #pull-zone { position: fixed; top: 0; left: 0; width: 100%; height: 50px; z-index: 100000; }
    </style>
</head>
<body>

    <div class="wallpaper"></div>
    <div class="overlay"></div>

    <div id="pull-zone" onclick="openMenu()"></div>

    <div id="pull-menu">
        <h2 style="color:var(--p); margin-bottom: 15px;">PAUSED</h2>
        <button class="btn btn-red" onclick="exitGame()">EXIT TO MENU</button>
        <button class="btn" style="background:#444; color:#fff;" onclick="closeMenu()">RESUME</button>
    </div>

    <iframe id="game-frame"></iframe>

    <div class="app-container" id="ui-main">
        <div class="header">
            <h1>GAMS</h1>
        </div>

        <div class="scroll-area">
            <div class="game-grid" id="grid"></div>
        </div>
    </div>

    <script>
        const menu = document.getElementById('pull-menu');
        const pullZone = document.getElementById('pull-zone');
        let startY = 0;

        // GESTURE
        pullZone.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
        pullZone.addEventListener('touchmove', e => {
            if (e.touches[0].clientY - startY > 40) openMenu();
        });

        function openMenu() { menu.style.transform = 'translateY(0)'; }
        function closeMenu() { menu.style.transform = 'translateY(-101%)'; }

        function launchGame(url) {
            const f = document.getElementById('game-frame');
            f.src = url; f.style.display = 'block';
            document.getElementById('ui-main').style.display = 'none';
            closeMenu();
        }

        function exitGame() {
            const f = document.getElementById('game-frame');
            f.src = ''; f.style.display = 'none';
            document.getElementById('ui-main').style.display = 'flex';
            closeMenu();
        }

        // ONLY YOUR VERIFIED WORKING GAMES
        const gamesList = [
            { n: 'Stickman Hook', u: 'g/stickmanhook.html', i: 'stickmanhook.png' },
            { n: 'Drive Mad', u: 'g/g/drivemad/drivemad.html', i: 'drivemad.png' },
            { n: '2048', u: 'g/2048.html', i: '2048.png' },
            { n: 'Cookie Clicker', u: 'g/g/cookie/index.html', i: 'cookieclicker.png' },
            { n: 'Its Raining Boxes', u: 'g/itsrainingboxes.html', i: 'itsrainingboxes.png' },
            { n: 'Stack', u: 'g/stack.html', i: 'stack.png' },
            { n: 'Rolling Forest', u: 'g/rollingforests.html', i: 'rollingforests.png' },
            { n: 'Fluid Simulator', u: 'g/fluidsimulator.html', i: 'fluidsimulator.png' },
            { n: 'Geometry Dash', u: 'g/geometrydash.html', i: 'geometrydash.png' },
            { n: 'Worldle+', u: 'g/wordle.html', i: 'wordle.png' },
            { n: 'Paper IO 2', u: 'g/paperio2.html', i: 'paperio2.png' },
            { n: 'Raft Wars 1', u: 'g/raftwars.html', i: 'raftwars.png' },
            { n: 'Raft Wars 2', u: 'g/raftwars2.html', i: 'raftwars2.png' }
        ];

        const grid = document.getElementById('grid');
        gamesList.forEach(g => {
            const d = document.createElement('div');
            d.className = 'tile';
            d.innerHTML = `<img src="img/${g.i}" onerror="this.src='img/gams-g.png'"><span>${g.n}</span>`;
            d.onclick = () => launchGame(g.u);
            grid.appendChild(d);
        });
    </script>
</body>
</html>
