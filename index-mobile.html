<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gams Mobile</title>
    <style>
        /* SIMPLEST BACKGROUND METHOD */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            background-image: url('ibg.svg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: sans-serif;
            color: #fff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }

        /* SEMI-TRANSPARENT OVERLAY TO ENSURE TEXT IS READABLE */
        .main-tint {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        /* PULL MENU */
        #pull-menu {
            position: fixed; top: 0; left: 0; width: 100%;
            background: #111;
            border-bottom: 3px solid #f00;
            z-index: 10000;
            transform: translateY(-100%);
            padding: calc(env(safe-area-inset-top) + 15px) 20px 30px;
            transition: transform 0.3s ease-out;
            text-align: center;
        }

        /* UI CONTENT */
        .app-ui {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }

        .header { 
            padding: 15px; 
            border-bottom: 3px solid #f00;
            background: rgba(0,0,0,0.6);
            text-align: center;
        }

        .scroll-grid {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .tile {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            backdrop-filter: blur(5px);
        }
        .tile img { width: 100%; border-radius: 10px; margin-bottom: 5px; }

        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        .btn-red { background: #f00; color: #fff; }

        #game-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; z-index: 5000; display: none; background: #000; }
        #pull-hitbox { position: fixed; top: 0; left: 0; width: 100%; height: 40px; z-index: 100000; }
    </style>
</head>
<body>

    <div class="main-tint"></div>

    <div id="pull-hitbox" onclick="showMenu()"></div>

    <div id="pull-menu">
        <h2 style="color:#f00; margin-bottom: 10px;">PAUSED</h2>
        <button class="btn btn-red" onclick="exitGame()">EXIT TO MENU</button>
        <button class="btn" style="background:#333; color:#fff;" onclick="hideMenu()">RESUME</button>
    </div>

    <iframe id="game-frame"></iframe>

    <div class="app-ui" id="main-content">
        <div class="header">
            <h1 style="letter-spacing: 3px;">GAMS</h1>
        </div>
        <div class="scroll-grid" id="grid"></div>
    </div>

    <script>
        const menu = document.getElementById('pull-menu');
        
        function showMenu() { menu.style.transform = 'translateY(0)'; }
        function hideMenu() { menu.style.transform = 'translateY(-100%)'; }

        function launchGame(url) {
            const frame = document.getElementById('game-frame');
            frame.src = url;
            frame.style.display = 'block';
            document.getElementById('main-content').style.display = 'none';
            hideMenu();
        }

        function exitGame() {
            const frame = document.getElementById('game-frame');
            frame.src = '';
            frame.style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            hideMenu();
        }

        // VERIFIED WORKING GAMES ONLY
        const myGames = [
            { n: 'Stickman Hook', u: 'g/stickmanhook.html', i: 'stickmanhook.png' },
            { n: 'Drive Mad', u: 'g/g/drivemad/drivemad.html', i: 'drivemad.png' },
            { n: '2048', u: 'g/2048.html', i: '2048.png' },
            { n: 'Cookie Clicker', u: 'g/g/cookie/index.html', i: 'cookieclicker.png' },
            { n: 'Its Raining Boxes', u: 'g/itsrainingboxes.html', i: 'itsrainingboxes.png' },
            { n: 'Stack', u: 'g/stack.html', i: 'stack.png' },
            { n: 'Rolling Forest', u: 'g/rollingforests.html', i: 'rollingforests.png' },
            { n: 'Fluid Simulator', u: 'g/fluidsimulator.html', i: 'fluidsimulator.png' },
            { n: 'Geometry Dash', u: 'g/geometrydash.html', i: 'geometrydash.png' },
            { n: 'Wordle+', u: 'g/wordle.html', i: 'wordle.png' },
            { n: 'Paper IO 2', u: 'g/paperio2.html', i: 'paperio2.png' },
            { n: 'Raft Wars 1', u: 'g/raftwars.html', i: 'raftwars.png' },
            { n: 'Raft Wars 2', u: 'g/raftwars2.html', i: 'raftwars2.png' }
        ];

        const grid = document.getElementById('grid');
        myGames.forEach(game => {
            const div = document.createElement('div');
            div.className = 'tile';
            div.innerHTML = `<img src="img/${game.i}" onerror="this.src='img/gams-g.png'"><div>${game.n}</div>`;
            div.onclick = () => launchGame(game.u);
            grid.appendChild(div);
        });
    </script>
</body>
</html>
