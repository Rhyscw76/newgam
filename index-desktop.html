<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rhys's Games</title>
    <link rel="icon" id="tab-icon" href="img/gams-g.png">
    <style>
        :root { --p: #f00; --g: rgba(15,15,15,.95); --b: rgba(255,255,255,.12); --glow: 0 0 25px rgba(255,0,0,.4); }
        * { margin:0; padding:0; box-sizing:border-box; outline:0; -webkit-user-select:none; user-select:none; scrollbar-width:none; }
        ::-webkit-scrollbar { display:none; }
        body { color:#fff; font-family:'Segoe UI',sans-serif; background:#666; min-height:100vh; overflow-x:hidden; background-size:cover; background-attachment:scroll; background-repeat:no-repeat; }
        
        #bg-switcher { position:fixed; top:-60px; left:15px; z-index:9999; background:var(--g); border:1px solid var(--b); padding:8px 12px; border-radius:8px; cursor:pointer; font-size:.65rem; font-weight:900; text-transform:uppercase; color:#fff; transition:.4s; opacity:0; }
        #bg-switcher.visible { top:15px; opacity:1; }
        #bg-switcher:hover { box-shadow:var(--glow); border-color:var(--p); transform:translateY(-4px); }

        #cloak-trigger { position:fixed; top:-60px; right:30px; width:80px; height:80px; z-index:6000; display:flex; align-items:flex-start; justify-content:flex-end; padding:15px; transition:.4s; opacity:0; }
        #cloak-trigger.visible { top:0; opacity:1; }
        #cloak-circle-btn { width:40px; height:40px; border-radius:50%; background:var(--g); border:1px solid var(--p); cursor:pointer; opacity:0; transition:.3s; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
        #cloak-trigger::after { content:''; position:absolute; top:15px; right:15px; width:40px; height:40px; border-radius:50%; background:rgba(255,0,0,0.1); border:1px solid rgba(255,0,0,0.3); pointer-events:none; }

        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:40000; backdrop-filter:blur(10px); align-items:center; justify-content:center; }
        .modal-content { background:var(--g); padding:30px; border-radius:24px; border:1px solid var(--p); text-align:center; max-width:400px; width:90%; }
        .modal-content h2 { margin-bottom: 6px; }
        .modal-subtitle { opacity:0.5; font-size:0.75rem; margin:8px 0 15px; }
        .extras-btn { width:100%; padding:14px 15px; border-radius:10px; border:1px solid var(--b); cursor:pointer; color:#fff; background:rgba(255,255,255,.1); font-weight:800; text-transform:uppercase; font-size:.7rem; transition:.3s; text-align:left; display:flex; flex-direction:column; gap:3px; }
        .extras-btn:hover { transform:translateY(-4px); box-shadow:var(--glow); border-color:var(--p); }
        .extras-btn-title { font-size:0.85rem; font-weight:900; }
        .extras-btn-sub { font-size:0.65rem; opacity:0.5; font-weight:400; text-transform:none; }

        #dashboard { display:flex; flex-direction:column; align-items:center; padding:60px 20px; z-index:1; }
        .header { text-align:center; margin-bottom:30px; background:var(--g); padding:20px 60px; border-radius:24px; border:1px solid var(--b); transition:.3s; cursor:default; }
        .header:hover { transform:translateY(-4px); box-shadow:var(--glow); border-color:var(--p); }
        .nav { width:100%; max-width:1200px; background:var(--g); border:1px solid var(--b); border-radius:20px; padding:10px; display:flex; gap:10px; position:sticky; top:20px; z-index:1000; backdrop-filter:blur(10px); transition:.3s; }
        .nav:hover { box-shadow:var(--glow); border-color:var(--p); }
        input { flex:2; background:rgba(0,0,0,0.6); border:1px solid var(--b); border-radius:12px; color:#fff; padding:10px 20px; user-select:text; transition:.3s; }
        input:hover, input:focus { border-color:var(--p); box-shadow:var(--glow); }

        .section-header { width:100%; max-width:1200px; margin:40px 0 15px; padding:12px 20px; background:rgba(0,0,0,.6); border-bottom:3px solid var(--p); text-transform:uppercase; font-weight:900; letter-spacing:2px; border-radius:4px; text-align:center; transition:.3s; cursor:default; }
        .section-header:hover { transform:translateY(-4px); box-shadow:var(--glow); }
        .game-grid { display:flex; flex-wrap:wrap; gap:15px; width:100%; max-width:1200px; margin:0 auto 40px; justify-content:center; }
        .tile { background:var(--g); border:1px solid var(--b); border-radius:20px; padding:15px; text-align:center; cursor:pointer; transition:.3s; width:clamp(100px, 18vw, 220px); position:relative; }
        .tile:hover { transform:translateY(-8px); border-color:var(--p); box-shadow:var(--glow); }
        .tile img { width:100%; aspect-ratio:1; border-radius:14px; object-fit:cover; margin-bottom:10px; display:block; pointer-events:none; }
        .tile-cog { position:absolute; top:8px; right:8px; width:22px; height:22px; opacity:0; transition:opacity .2s, background .2s; border-radius:50%; background:rgba(0,0,0,.7); display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:2; }
        .tile:hover .tile-cog { opacity:1; }
        .tile-cog:hover { background:var(--p); box-shadow:var(--glow); }
        .tile-cog span { display:flex; align-items:center; justify-content:center; width:14px; height:14px; transition:transform .3s; transform-origin:50% 50%; }
        .tile-cog:hover span { transform:rotate(45deg); }

        #custom-scroll { position:fixed; right:8px; top:0; height:100vh; z-index:9998; display:flex; flex-direction:column; align-items:center; padding:8px 0; gap:4px; }
        #scroll-track { width:10px; flex:1; background:rgba(255,255,255,.08); border-radius:10px; position:relative; cursor:pointer; }
        #scroll-thumb { width:10px; background:var(--p); border-radius:10px; position:absolute; top:0; left:0; box-shadow:0 0 8px var(--p); min-height:30px; transition:background .2s; }
        #scroll-thumb:hover { background:#ff4444; }
        .scroll-arrow { width:20px; height:20px; cursor:pointer; background:rgba(255,255,255,.05); border-radius:50%; display:flex; align-items:center; justify-content:center; transition:.2s; }
        .scroll-arrow:hover { background:rgba(255,0,0,.1); box-shadow:var(--glow); }
        .scroll-arrow span { display:block; transition:transform .3s; transform-origin:50% 52%; font-size:12px; margin-top:1px; }
        #scroll-down span { transform:rotate(180deg); }

        #game-overlay { position:fixed; inset:0; background:#000; z-index:10000; display:none; }
        #game-frame { width:100%; height:100%; border:none; }
        #game-nav { position:fixed; top:-100px; left:50%; transform:translateX(-50%); background:var(--g); padding:10px 30px; border-radius:0 0 20px 20px; border:1px solid var(--b); display:flex; gap:20px; z-index:20000; transition:.4s; align-items:center; }
        #game-nav.show { top:0; }
        #game-hover-zone { display:none; position:fixed; top:0; left:0; width:100%; height:60px; z-index:19999; }
        #game-overlay.active #game-hover-zone { display:block; }
        :fullscreen #game-nav, :-webkit-full-screen #game-nav { display:none; }

        .btn { padding:8px 15px; border-radius:10px; border:1px solid var(--b); cursor:pointer; color:#fff; background:rgba(255,255,255,.1); font-weight:800; text-transform:uppercase; font-size:.7rem; transition:.3s; }
        .btn:hover { transform:translateY(-4px); box-shadow:var(--glow); border-color:var(--p); }
        #snow { position:fixed; inset:0; pointer-events:none; z-index:0; }
        #ctx-menu { display:none; position:fixed; background:var(--g); border:1px solid var(--p); border-radius:12px; z-index:50000; width:180px; padding:5px; box-shadow:var(--glow); }
        .ctx-item { padding:10px; cursor:pointer; border-radius:8px; font-size:.85rem; font-weight:600; }
        .ctx-item:hover { background:var(--p); }
        #mobile-btn { position:fixed; bottom:-80px; left:15px; z-index:5000; background:var(--g); border:1px solid var(--b); padding:10px 15px; border-radius:12px; display:flex; align-items:center; justify-content:center; gap:8px; transition:.4s; opacity:0; text-decoration:none; color:#fff; font-weight:900; font-size:.75rem; text-transform:uppercase; }
        #mobile-btn.visible { bottom:15px; opacity:1; }
        #mobile-btn:hover { box-shadow:var(--glow); border-color:var(--p); }
        .theme-tester { position:fixed; bottom:-80px; right:15px; z-index:5000; background:var(--g); border:1px solid var(--b); padding:8px 15px; border-radius:12px; display:flex; align-items:center; gap:10px; transition:.4s; opacity:0; }
        .theme-tester.visible { bottom:15px; opacity:1; }
    </style>
</head>
<body onload="init()" oncontextmenu="return false;">
    <div id="custom-scroll">
        <div class="scroll-arrow" id="scroll-up"><span>▲</span></div>
        <div id="scroll-track"><div id="scroll-thumb"></div></div>
        <div class="scroll-arrow" id="scroll-down"><span>▲</span></div>
    </div>
    <canvas id="snow"></canvas>
    <button id="bg-switcher" onclick="switchWallpaper()">Wallpaper</button>
    <a href="index-mobile.html" id="mobile-btn">📱 Mobile</a>

    <div id="cloak-trigger" onmouseenter="v('cloak-circle-btn',1)" onmouseleave="v('cloak-circle-btn',0)">
        <div id="cloak-circle-btn" onclick="tgl('cloak-modal')">🔒</div>
    </div>

    <div id="cloak-modal" class="modal" onclick="if(event.target==this)tgl('cloak-modal')">
        <div class="modal-content">
            <h2>TAB CLOAK</h2>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0;">
                <button class="btn" onclick="setCloak('Google','https://google.com/favicon.ico')">Google</button>
                <button class="btn" onclick="setCloak('Home - Classroom','https://ssl.gstatic.com/classroom/favicon.png')">Classroom</button>
                <button class="btn" onclick="setCloak('My Drive','https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png')">Drive</button>
                <button class="btn" onclick="setCloak('Rhys\'s Games','img/gams-g.png')">Reset</button>
            </div>
            <button class="btn" style="width:100%" onclick="tgl('cloak-modal')">Close</button>
        </div>
    </div>

    <div id="extras-modal" class="modal" onclick="if(event.target==this)tgl('extras-modal')">
        <div class="modal-content">
            <h2>EXTRAS</h2>
            <p class="modal-subtitle">These tools are web dependent and may not work on restricted networks.</p>
            <div style="display:flex;flex-direction:column;gap:10px;margin:15px 0;">
                <button class="extras-btn" onclick="const r=this.getBoundingClientRect();tgl('extras-modal');suppressCtxClear=true;setTimeout(()=>showCtx(r.left,r.bottom+4,'sandstone.html','Sandstone'),0)">
                    <span class="extras-btn-title">Sandstone</span>
                    <span class="extras-btn-sub">Web Proxy — main browser proxy</span>
                </button>
                <button class="extras-btn" onclick="const r=this.getBoundingClientRect();tgl('extras-modal');suppressCtxClear=true;setTimeout(()=>showCtx(r.left,r.bottom+4,'heliosoffline.html','Helios Browser'),0)">
                    <span class="extras-btn-title">Helios</span>
                    <span class="extras-btn-sub">Browser Proxy — original full-featured version</span>
                </button>
                <button class="extras-btn" onclick="const r=this.getBoundingClientRect();tgl('extras-modal');suppressCtxClear=true;setTimeout(()=>showCtx(r.left,r.bottom+4,'helimain/index.html','Heli Browser'),0)">
                    <span class="extras-btn-title">Heli</span>
                    <span class="extras-btn-sub">Browser Proxy — lightweight CSS-compatible alternative</span>
                </button>
                <button class="extras-btn" onclick="openGame('nautilusosonefile.html','Nautilus OS');tgl('extras-modal')">
                    <span class="extras-btn-title">Nautilus</span>
                    <span class="extras-btn-sub">Web Operating System — full desktop experience in browser</span>
                </button>
                <button class="extras-btn" onclick="openGame('ng/soundboard.html','Soundboard');tgl('extras-modal')">
                    <span class="extras-btn-title">Soundboard</span>
                    <span class="extras-btn-sub">Audio snippets and sound effects board</span>
                </button>
            </div>
            <button class="btn" style="width:100%" onclick="tgl('extras-modal')">Close</button>
        </div>
    </div>

    <div id="ctx-menu" style="display:none;">
        <div class="ctx-item" id="ctx-tab">Open in Tab</div>
        <div class="ctx-item" id="ctx-new">Open in New Tab</div>
        <div class="ctx-item" id="ctx-blank">Open in About:Blank</div>
    </div>

    <div id="game-overlay">
        <div id="game-nav">
            <h2 id="gt"></h2>
            <button class="btn" onclick="toggleFS()">FS</button>
            <button class="btn" onclick="tgl('cloak-modal')">🔒 Cloak</button>
            <button class="btn" onclick="closeGame()">Exit</button>
        </div>
        <div id="game-hover-zone"></div>
        <iframe id="game-frame" allow="fullscreen"></iframe>
    </div>

    <div id="dashboard">
        <div class="header">
            <h1 style="font-size:3.5rem;letter-spacing:12px;text-shadow:0 0 20px var(--p)">RHYS'S GAMES</h1>
            <p style="font-weight:900;opacity:.8">LIBRARY: <span id="count">0</span></p>
        </div>
        <div class="nav">
            <input id="search" oninput="doSearch()" placeholder="">
            <button class="btn" onclick="openGame('g/g/ruffle/ruffle.html','Flash')">Flash</button>
            <button class="btn" onclick="toggleFS()">FS</button>
            <button class="btn" onclick="tgl('extras-modal')">Extras</button>
        </div>
        <div id="content" style="width:100%;display:flex;flex-direction:column;align-items:center;"></div>
    </div>

    <div class="theme-tester" id="themeTester">
        <input type="color" id="cp" value="#FF0000" oninput="uTheme(this.value)">
        <span id="hex" style="font-weight:bold;color:var(--p);font-family:monospace">#FF0000</span>
    </div>

<script>
    const bgs = [
        {s:'bg.svg',  p:'center -475px', f:'#666666'},
        {s:'bg2.svg', p:'center -1200px', f:'#6E6D6B', n:0}
    ];
    let curBg = 0, sTar = 0, sAnim = false;

    const fullLib = [
        {title:"Minecraft"},

        {name:"Jetpack Joyride",             img:"ng/jetpackjoyride.png", path:"ng/jetpackjoyride.html"},
        {name:"Kindergarten",                img:"ng/kindergarten.png", path:"ng/kindergarten.html"},
        {name:"Kindergarten 2",              img:"ng/kindergarten2.png", path:"ng/kindergarten2.html"},
        {name:"Kindergarten 3",              img:"ng/kindergarten3.png", path:"ng/kindergarten3.html"},
        {name:"Motox 3M",                    img:"ng/motox3m.png", path:"ng/motox3m.html"},
        {name:"Motox 3M 2",                  img:"ng/motox3m2.png", path:"ng/motocross3m2.html"},
        {name:"People Playground",           img:"ng/peopleplayground.png", path:"ng/peopleplayground.html"},
        {name:"Polytrack",                   img:"ng/polytrack.png", path:"ng/polytrack.html"},
        {name:"Repo",                        img:"ng/repo.png", path:"ng/repo.html"},
        {name:"That's Not My Neighbour",     img:"ng/thatsnotmyneighbour.png", path:"ng/thatsnotmyneighbour.html"},
        {name:"Ultrakill",                   img:"ng/ultrakill.png", path:"ng/ultrakill.html"},
        {title:"Basic"},
        {name:"Stickman Hook",      path:"g/stickmanhook.html"},
        {name:"Drive Mad",          path:"g/g/drivemad/drivemad.html"},
        {name:"2048",               path:"g/2048.html"},
        {name:"Cookie Clicker",    path:"g/g/cookie/index.html"},
        {name:"Cube Field",        path:"g/g/cubefield/index.html"},
        {name:"Spacebar Clicker",  path:"g/spacebarclicker.html"},
        {name:"Offline Paradise",  path:"g/offlineparadise.html"},
        {name:"Sandboxels",        img:"sand.png", path:"sandboxelsmain/index.html"},
        {name:"Agario Lite",       path:"g/agarolite.html"},
        {name:"Evil Glitch",       path:"g/evilglitch.html"},
        {name:"Its Raining Boxes", path:"g/itsrainingboxes.html"},
        {name:"T Rex",              path:"g/trex.html"},
        {name:"Stack",              path:"g/stack.html"},
        {name:"Rolling Forests",    path:"g/rollingforests.html"},
        {name:"Radius Raid",        path:"g/radiusraid.html"},

        {name:"Edge Not Found",     path:"g/edgenotfound.html"},
        {name:"Ninja vs EVILCORP", path:"g/ninjavsevilcorp.html"},
        {name:"Geometry Dash",      path:"g/geometrydash.html"},
        {name:"Wordle",             path:"g/wordle.html"},
        {name:"Paper IO 2",         path:"g/paperio2.html"},
        {name:"Slow Roads",        img:"slow.png", path:"slowroads.html"},
        {title:"Unity"},
        {name:"Shell Shockers",    img:"shell.jpg", path:"shellshockers/index.html"},
        {name:"Slime Rancher",      img:"ranch.png",  path:"slimerancher.html"},
        {name:"Raft Game",          img:"raft.png",    path:"g/raftgame/index.html"},

        {name:"Tube Jumpers",       path:"g/tubejumpers.html"},

        {name:"Madalin Stunt Cars", path:"g/g/madalinstuntcars/madalinstuntcars.html"},

        {name:"A Dance of Fire and Ice",path:"g/g/fireice/index.html"},

        {name:"Ai Creatures",            path:"g/g/aicreatures/index.html"},
        {name:"Grey Box Testing",        path:"g/g/greybox/index.html"},
        {title:"Retrogaming"},
        {name:"Doom",           img:"ng/doom.png",  path:"ng/doom.html"},
        {name:"Half Life",      img:"half.png",     path:"halflife.html"},
        {name:"Super Mario 64", path:"g/supermario64.html"},
        {name:"Celeste",        path:"g/celeste.html"},

        {title:"Henry Stickmin"},

        {name:"Stealing The Diamond",      path:"g/stealingthediamond.html"},

        {name:"Bloons Tower Defense 2", path:"g/bloonstowerdefense2.html"},

        {name:"Pacman",                 path:"g/pacman.html"},
        {name:"1 on 1 Soccer",          path:"g/1on1soccer.html"},
        {name:"QWOP",                   path:"g/qwop.html"},
        {name:"Use Boxmen",             path:"g/useboxmen.html"},
        {name:"40x Escape",             path:"g/40xescape.html"},
        {name:"Stickman Life",          path:"g/stickmanlife.html"},
        {name:"Duck Life 1",            path:"g/ducklife1.html"},
        {name:"Duck Life 2",            path:"g/ducklife2.html"},
        {name:"Duck Life 3",            path:"g/ducklife3.html"},
        {name:"Duck Life 4",            path:"g/ducklife4.html"},
        {name:"Duck Life 5",            path:"g/ducklife5.html"}
    ];

    const v = (id, o) => document.getElementById(id).style.opacity = o;
    const tgl = id => { const m = document.getElementById(id); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; };
    const uTheme = c => { document.documentElement.style.setProperty('--p', c); document.getElementById('hex').innerText = c.toUpperCase(); };

    function applyBg(i) {
        const c = bgs[i];
        document.body.style.backgroundImage = `url('${c.s}')`;
        document.body.style.backgroundPosition = c.p;
        document.body.style.backgroundColor = c.f;
        document.body.style.backgroundSize = i === 1 ? 'contain' : 'cover';
        document.body.style.backgroundAttachment = 'scroll';
        document.body.style.backgroundRepeat = 'no-repeat';
        document.getElementById('snow').style.display = c.n === 0 ? 'none' : 'block';
        curBg = i;
        localStorage.setItem('gbg', i);
    }

    function switchWallpaper() { applyBg((curBg + 1) % bgs.length); }

    function init() {
        const s = localStorage.getItem('gbg');
        applyBg(s === null ? Math.floor(Math.random() * bgs.length) : parseInt(s));
        const root = document.getElementById('content');
        let total = 0, grid = null;
        fullLib.forEach(i => {
            if (i.title) {
                const h = document.createElement('div'); h.className = 'section-header'; h.innerText = i.title;
                grid = document.createElement('div'); grid.className = 'game-grid'; root.append(h, grid);
            } else {
                total++;
                const id = i.name.toLowerCase().replace(/\s/g,'').replace(/[^a-z0-9]/g,'');
                const p = i.path || `g/${id}.html`;
                const t = document.createElement('div'); t.className = 'tile';
                const imgSrc = i.img ? i.img : id + '.png';
                t.innerHTML = `<img src="${imgSrc}" onerror="if(!this.dataset.err){this.dataset.err='1';this.src='img/${imgSrc}';}else{this.onerror=null;this.src='img/gams-g.png';}"><p>${i.name}</p>${i.newTab ? '' : '<div class="tile-cog" title="Options"><span><svg viewBox="0 0 24 24" width="14" height="14" fill="white"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></span></div>'}`;
                t.onclick = () => i.newTab ? window.open(p, '_blank') : openGame(p, i.name);
                if (!i.newTab) {
                    t.oncontextmenu = e => { e.preventDefault(); showCtx(e.clientX, e.clientY, p, i.name); };
                    t.querySelector('.tile-cog').addEventListener('click', e => {
                        e.stopPropagation();
                        const r = e.currentTarget.getBoundingClientRect();
                        showCtx(r.left, r.bottom + 4, p, i.name);
                    });
                }
                grid.appendChild(t);
            }
        });
        document.getElementById('count').innerText = total;
        setupScroll();
        startSnow();
        setupTyper();
    }

    function showCtx(x, y, p, n) {
        const m = document.getElementById('ctx-menu');
        m.style.display = 'block'; m.style.left = x + 'px'; m.style.top = y + 'px';
        document.getElementById('ctx-tab').onclick   = () => { openGame(p, n); m.style.display = 'none'; };
        document.getElementById('ctx-new').onclick   = () => { window.open(p, '_blank'); m.style.display = 'none'; };
        document.getElementById('ctx-blank').onclick = () => {
            const w = window.open('about:blank', '_blank');
            w.document.body.style.margin = '0';
            const f = w.document.createElement('iframe');
            f.style.cssText = 'border:none;width:100%;height:100%;position:fixed;inset:0';
            f.src = location.href.substring(0, location.href.lastIndexOf('/')) + '/' + p;
            w.document.body.appendChild(f);
            m.style.display = 'none';
        };
    }

    function openGame(s, n) {
        document.getElementById('game-frame').src = s;
        document.getElementById('gt').innerText = n.toUpperCase();
        const o = document.getElementById('game-overlay');
        o.style.display = 'block'; o.classList.add('active');
        document.body.style.overflow = 'hidden';
        const z = document.getElementById('game-hover-zone'), nv = document.getElementById('game-nav');
        let hoverStart = 0, hideTimer = null;
        function showNav() { clearTimeout(hideTimer); nv.classList.add('show'); hoverStart = Date.now(); }
        function hideNav() { const d = Date.now() - hoverStart; hideTimer = setTimeout(() => nv.classList.remove('show'), d < 350 ? 1500 : 0); }
        z.onmouseenter = showNav; z.onmouseleave = hideNav;
        nv.onmouseenter = () => { clearTimeout(hideTimer); nv.classList.add('show'); };
        nv.onmouseleave = hideNav;
    }

    function closeGame() {
        const o = document.getElementById('game-overlay');
        o.style.display = 'none'; o.classList.remove('active');
        document.getElementById('game-frame').src = '';
        document.getElementById('game-nav').classList.remove('show');
        document.body.style.overflow = 'auto';
    }

    function setupScroll() {
        const tr = document.getElementById('scroll-track'),
              th = document.getElementById('scroll-thumb'),
              bt = document.getElementById('bg-switcher'),
              tt = document.getElementById('themeTester'),
              ct = document.getElementById('cloak-trigger');

        function upScroll() {
            const curY = window.scrollY, mx = document.body.scrollHeight - window.innerHeight;
            const r = mx > 0 ? curY / mx : 0;
            const trackH = tr.offsetHeight, thumbH = Math.max(30, trackH * (window.innerHeight / document.body.scrollHeight));
            th.style.height = thumbH + 'px'; th.style.top = (r * (trackH - thumbH)) + 'px';
            bt.classList.toggle('visible', curY <= 50);
            ct.classList.toggle('visible', curY <= 50);
            tt.classList.toggle('visible', curY >= mx - 50 && curY > 50);
            document.getElementById('mobile-btn').classList.toggle('visible', curY >= mx - 50 && curY > 50);
        }

        function smooth(t) {
            sTar = Math.max(0, Math.min(t, document.body.scrollHeight - window.innerHeight));
            if (!sAnim) animScroll();
        }

        function animScroll() {
            sAnim = true;
            const cur = window.scrollY, d = sTar - cur;
            if (Math.abs(d) < 1) { window.scrollTo(0, sTar); sAnim = false; upScroll(); return; }
            window.scrollTo(0, cur + d * 0.12); upScroll(); requestAnimationFrame(animScroll);
        }

        let isDrag = false, dragStartY, dragStartScroll;
        th.onmousedown = e => { isDrag = true; dragStartY = e.clientY; dragStartScroll = window.scrollY; sAnim = false; e.preventDefault(); e.stopPropagation(); };

        let pageDrag = false, pageStartY, pageStartScroll;
        window.addEventListener('mousedown', e => {
            if (e.button === 0 && !e.target.closest('.tile,.btn,input,#scroll-thumb,#scroll-track,.scroll-arrow,.modal-content,#ctx-menu')) {
                pageDrag = true; pageStartY = e.clientY; pageStartScroll = sTar; sAnim = false;
            }
        });

        window.onmousemove = e => {
            if (isDrag) {
                const trackH = tr.offsetHeight - th.offsetHeight;
                const newS = dragStartScroll + ((e.clientY - dragStartY) / trackH) * (document.body.scrollHeight - window.innerHeight);
                sTar = Math.max(0, Math.min(newS, document.body.scrollHeight - window.innerHeight));
                window.scrollTo(0, sTar); upScroll();
            } else if (pageDrag) {
                smooth(pageStartScroll + (pageStartY - e.clientY) * 1.5);
            }
            if (midActive) window.currentMouseY = e.clientY;
        };

        window.onmouseup = () => { isDrag = false; pageDrag = false; };
        tr.onclick = e => {
            if (e.target === th) return;
            smooth((e.clientY - tr.getBoundingClientRect().top) / tr.offsetHeight * (document.body.scrollHeight - window.innerHeight));
        };
        window.addEventListener('wheel', e => { if (midActive) return; e.preventDefault(); smooth(sTar + e.deltaY * 0.8); }, {passive:false});
        document.getElementById('scroll-up').onclick   = () => smooth(sTar - 400);
        document.getElementById('scroll-down').onclick = () => smooth(sTar + 400);

        let midActive = false, midOriginY = 0, midRAF = null;
        window.currentMouseY = 0;
        const midCursor = document.createElement('div');
        midCursor.style.cssText = 'position:fixed;width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);background:rgba(15,15,15,0.95);pointer-events:none;transform:translate(-50%,-50%);z-index:99999;display:none;';
        document.body.appendChild(midCursor);

        window.addEventListener('mousedown', e => {
            if (e.button === 1) {
                e.preventDefault();
                if (midActive) {
                    midActive = false; midCursor.style.display = 'none'; cancelAnimationFrame(midRAF);
                } else {
                    midActive = true; midOriginY = e.clientY; window.currentMouseY = e.clientY;
                    midCursor.style.left = e.clientX + 'px'; midCursor.style.top = e.clientY + 'px';
                    midCursor.style.display = 'block';
                    (function loop() {
                        if (!midActive) return;
                        const speed = (window.currentMouseY - midOriginY) * 0.15;
                        if (Math.abs(speed) > 0.5) {
                            sTar = Math.max(0, Math.min(sTar + speed, document.body.scrollHeight - window.innerHeight));
                            window.scrollTo(0, sTar); upScroll();
                        }
                        midRAF = requestAnimationFrame(loop);
                    })();
                }
            }
            if (e.button === 0 && midActive) { midActive = false; midCursor.style.display = 'none'; cancelAnimationFrame(midRAF); }
        }, {passive:false});

        window.addEventListener('keydown', e => {
            if (midActive && e.key === 'Escape') { midActive = false; midCursor.style.display = 'none'; cancelAnimationFrame(midRAF); }
        });

        window.onscroll = upScroll; window.onresize = upScroll; upScroll();
    }

    function setupTyper() {
        const el = document.getElementById('search'), txt = 'Search your Games Here...';
        let cur = '', timer;
        el.onmouseenter = () => { if (el.value) return; clearInterval(timer); let i = cur.length; timer = setInterval(() => { cur += txt[i++]; el.placeholder = cur; if (i >= txt.length) clearInterval(timer); }, 60); };
        el.onmouseleave = () => { if (el.value) return; clearInterval(timer); timer = setInterval(() => { cur = cur.slice(0,-1); el.placeholder = cur; if (!cur.length) clearInterval(timer); }, 40); };
    }

    function doSearch() {
        const clean = s => s.trim().replace(/\s+/g,' ').replace(/[^a-z0-9 ]/gi,'').toUpperCase();
        const q = clean(document.getElementById('search').value);
        document.querySelectorAll('.game-grid').forEach(g => {
            let has = false;
            g.querySelectorAll('.tile').forEach(t => { const m = clean(t.innerText).includes(q); t.style.display = m ? '' : 'none'; if (m) has = true; });
            const h = g.previousElementSibling;
            if (h && h.classList.contains('section-header')) h.style.display = has ? '' : 'none';
        });
    }

    function startSnow() {
        const c = document.getElementById('snow'), ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const f = Array.from({length:80}, () => ({x:Math.random()*c.width, y:Math.random()*c.height, r:Math.random()*2+1, v:Math.random()*1.5+0.5}));
        (function draw() { ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle='white'; f.forEach(p => { p.y+=p.v; if(p.y>c.height) p.y=-10; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); }); requestAnimationFrame(draw); })();
    }

    function setCloak(t, f) { document.title = t; document.getElementById('tab-icon').href = f; tgl('cloak-modal'); }
    function toggleFS() { if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); } else { document.exitFullscreen(); } }
</script>
