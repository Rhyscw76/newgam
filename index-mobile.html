<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gams Mobile</title>
    <style>
        :root { 
            --p: #f00; 
            --bg-hud: rgba(15,15,15,0.95); 
            --txt: #fff;
            --card: rgba(255, 255, 255, 0.05);
            --overlay: rgba(0,0,0,0.4);
        }
        
        /* THE ACTUAL WHITE THEME */
        body.light-mode {
            --p: #007aff;
            --bg-hud: rgba(255, 255, 255, 0.98);
            --txt: #000;
            --card: rgba(0, 0, 0, 0.05);
            --overlay: rgba(255, 255, 255, 0.7);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
        
        html, body { 
            background: #000; height: 100vh; width: 100vw; 
            overflow: hidden; font-family: 'Segoe UI', sans-serif; color: var(--txt);
        }

        /* IBG.SVG FIX: High Priority Layering */
        #wallpaper-engine {
            position: fixed; inset: 0;
            background: url('ibg.svg') center/cover no-repeat !important;
            z-index: -2;
        }
        #color-overlay {
            position: fixed; inset: 0;
            background: var(--overlay);
            z-index: -1;
            transition: background 0.3s;
        }

        /* PULL MENU: Fixed Gap & Safe Areas */
        #pull-menu {
            position: fixed; top: 0; left: 0; width: 100%;
            background: var(--bg-hud);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 3px solid var(--p);
            z-index: 10000;
            transform: translateY(-100%);
            will-change: transform;
            /* Padding-top ensures color goes behind the notch/status bar */
            padding: calc(env(safe-area-inset-top) + 10px) 20px 25px;
            display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .reload-icon {
            position: absolute; top: calc(env(safe-area-inset-top) + 5px); right: 15px;
            font-size: 1.8rem; background:none; border:none; color: var(--txt);
        }

        /* UI LAYOUT */
        .main-wrapper {
            position: relative; height: 100%; display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }

        .header { 
            padding: 15px; border-bottom: 2px solid var(--p); 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.1);
        }

        .grid { 
            flex: 1; overflow-y: auto; display: grid; 
            grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px;
        }

        .tile { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 10px; text-align: center;
            backdrop-filter: blur(5px);
        }
        body.light-mode .tile { border: 1px solid rgba(0,0,0,0.1); }
        .tile img { width: 100%; border-radius: 10px; margin-bottom: 5px; }

        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; text-transform: uppercase; }
        .btn-red { background: var(--p); color: #fff; }
        .btn-theme { background: var(--txt); color: var(--bg-hud); margin-top: 5px; border: 1px solid var(--p); }

        #game-view { position: fixed; inset: 0; width: 100%; height: 100%; border: none; z-index: 5000; display: none; background: #000; }
        #drag-zone { position: fixed; top: 0; left: 0; width: 100%; height: 40px; z-index: 100000; }
    </style>
</head>
<body>

    <div id="wallpaper-engine"></div>
    <div id="color-overlay"></div>
    <div id="drag-zone"></div>

    <div id="pull-menu">
        <button class="reload-icon" onclick="location.reload()">↻</button>
        <h2 style="color:var(--p); text-align: center;">PAUSED</h2>
        <button class="btn btn-red" onclick="exitGame()">EXIT TO MENU</button>
        <button class="btn btn-theme" onclick="swapTheme()">SWITCH THEME</button>
        <button class="btn" style="background:#444; color:#fff;" onclick="hideMenu()">RESUME</button>
    </div>

    <iframe id="game-view"></iframe>

    <div class="main-wrapper" id="ui-screen">
        <div class="header">
            <h1 style="letter-spacing: 2px;">GAMS</h1>
            <button onclick="showMenu()" style="background:none; border:none; font-size:1.5rem;">⚙️</button>
        </div>
        
        <div class="grid" id="game-grid"></div>
    </div>

    <script>
        const menu = document.getElementById('pull-menu');
        const dragZone = document.getElementById('drag-zone');
        let startY = 0;

        // THEME STORAGE & LOGIC
        function swapTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('user-theme', isLight ? 'light' : 'dark');
        }

        if(localStorage.getItem('user-theme') === 'light') document.body.classList.add('light-mode');

        // GESTURE
        dragZone.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
        dragZone.addEventListener('touchmove', e => {
            let dist = e.touches[0].clientY - startY;
            if(dist > 30) showMenu();
        });

        function showMenu() { menu.style.transform = 'translateY(0)'; }
        function hideMenu() { menu.style.transform = 'translateY(-100%)'; }

        function launchGame(url) {
            const g = document.getElementById('game-view');
            g.src = url; g.style.display = 'block';
            document.getElementById('ui-screen').style.display = 'none';
            hideMenu();
        }

        function exitGame() {
            const g = document.getElementById('game-view');
            g.src = ''; g.style.display = 'none';
            document.getElementById('ui-screen').style.display = 'flex';
            hideMenu();
        }

        const games = [
            { n: 'Stickman Hook', u: 'g/stickmanhook.html', i: 'stickmanhook.png' },
            { n: 'Drive Mad', u: 'g/g/drivemad/drivemad.html', i: 'drivemad.png' },
            { n: '2048', u: 'g/2048.html', i: '2048.png' },
            { n: 'Cookie Clicker', u: 'g/g/cookie/index.html', i: 'cookieclicker.png' },
            { n: 'Geometry Dash', u: 'g/geometrydash.html', i: 'geometrydash.png' },
            { n: 'Paper IO 2', u: 'g/paperio2.html', i: 'paperio2.png' }
        ];

        const grid = document.getElementById('game-grid');
        games.forEach(game => {
            const div = document.createElement('div');
            div.className = 'tile';
            div.innerHTML = `<img src="img/${game.i}" onerror="this.src='img/gams-g.png'"><div>${game.n}</div>`;
            div.onclick = () => launchGame(game.u);
            grid.appendChild(div);
        });
    </script>
</body>
</html>
