<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gams Mobile</title>
    <link rel="icon" id="tab-icon" href="img/gams-g.png">
    <style>
        /* THEME SYSTEM */
        :root { 
            --p: #f00; 
            --bg-menu: rgba(15,15,15,0.98); 
            --txt: #fff;
            --tile: rgba(255, 255, 255, 0.05);
            --brd: rgba(255, 255, 255, 0.1);
            --overlay: rgba(0,0,0,0.4);
        }
        
        body.light-mode {
            --p: #007aff;
            --bg-menu: rgba(245, 245, 247, 0.98);
            --txt: #000;
            --tile: rgba(0, 0, 0, 0.05);
            --brd: rgba(0, 0, 0, 0.1);
            --overlay: rgba(255,255,255,0.8);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
        
        html, body { 
            background: #000; height: 100%; width: 100%; 
            overflow: hidden; overscroll-behavior: none; 
            font-family: 'Segoe UI', sans-serif; color: var(--txt);
        }

        /* THE WALLPAPER: Forced rendering of ibg.svg */
        .ibg-wallpaper {
            position: fixed;
            inset: 0;
            background-image: url('ibg.svg') !important;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2; /* Behind everything */
        }

        .ibg-overlay {
            position: fixed;
            inset: 0;
            background: var(--overlay);
            z-index: -1;
            transition: background 0.3s ease;
        }

        /* UI ELEMENTS */
        .mobile-container {
            position: relative; height: 100%; width: 100%;
            display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top);
            z-index: 10;
        }

        #pull-menu {
            position: fixed; top: 0; left: 0; width: 100%;
            background: var(--bg-menu);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-bottom: 3px solid var(--p);
            z-index: 999999;
            transform: translateY(-101%);
            padding: calc(env(safe-area-inset-top) + 10px) 20px 30px;
            transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.1);
            text-align: center;
        }

        /* OTHER STYLES */
        .mobile-header { padding: 15px; border-bottom: 3px solid var(--p); display: flex; justify-content: space-between; align-items: center; }
        .mobile-search { padding: 12px; }
        .mobile-search input { width: 100%; padding: 12px; background: var(--tile); border: 1.5px solid var(--brd); border-radius: 12px; color: var(--txt); }
        .mobile-game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .mobile-tile { background: var(--tile); border-radius: 18px; padding: 10px; text-align: center; border: 1.5px solid var(--brd); backdrop-filter: blur(10px); }
        .mobile-tile img { width: 100%; border-radius: 14px; margin-bottom: 8px; }
        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 900; text-transform: uppercase; margin-top: 10px; }
        .btn-red { background: var(--p); color: #fff; }
        .btn-dark { background: #1a1a1a; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        body.light-mode .btn-dark { background: #fff; color: #000; border: 1px solid #ccc; }
        
        #game-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; display: none; z-index: 50; background: #000; }
        #pull-trigger { position: fixed; top: 0; left: 0; width: 100%; height: 50px; z-index: 1000000; }
    </style>
</head>
<body>

    <div class="ibg-wallpaper"></div>
    <div class="ibg-overlay"></div>

    <div id="pull-trigger"></div>

    <div id="pull-menu">
        <h2 style="color:var(--p);">PAUSED</h2>
        <button class="btn btn-red" onclick="leaveGame()">🚪 EXIT GAME</button>
        <button class="btn btn-dark" onclick="toggleTheme()">🌓 TOGGLE THEME</button>
        <button class="btn btn-dark" onclick="closeMenu()">▶️ RESUME</button>
    </div>

    <iframe id="game-frame"></iframe>

    <div class="mobile-container" id="main-ui">
        <div class="mobile-header">
            <h1>GAMS</h1>
            <button class="btn-dark" style="padding: 5px 10px; border-radius: 8px;" onclick="openMenu()">⚙️</button>
        </div>
        <div class="mobile-search">
            <input type="text" placeholder="Search games..." oninput="search(this.value)">
        </div>
        <div style="flex:1; overflow-y:auto;">
            <div class="mobile-game-grid" id="grid"></div>
        </div>
    </div>

    <script>
        // THEME ENGINE
        function applyTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
        }

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('gams-theme', isLight ? 'light' : 'dark');
        }

        // Initialize theme
        applyTheme(localStorage.getItem('gams-theme'));

        // PULL MENU LOGIC
        const menu = document.getElementById('pull-menu');
        const trigger = document.getElementById('pull-trigger');
        let startY = 0;

        trigger.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
        trigger.addEventListener('touchmove', e => {
            let moveY = e.touches[0].clientY;
            if (moveY - startY > 50) openMenu();
        });

        function openMenu() { menu.style.transform = 'translateY(0%)'; }
        function closeMenu() { menu.style.transform = 'translateY(-101%)'; }

        function loadGame(url) {
            document.getElementById('game-frame').src = url;
            document.getElementById('game-frame').style.display = 'block';
            document.getElementById('main-ui').style.display = 'none';
            closeMenu();
        }

        function leaveGame() {
            document.getElementById('game-frame').src = '';
            document.getElementById('game-frame').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            closeMenu();
        }

        function search(q) {
            const tiles = document.querySelectorAll('.mobile-tile');
            tiles.forEach(t => { t.style.display = t.innerText.toLowerCase().includes(q.toLowerCase()) ? '' : 'none'; });
        }

        const games = [
            { n: 'Stickman Hook', u: 'g/stickmanhook.html', i: 'stickmanhook.png' },
            { n: 'Drive Mad', u: 'g/g/drivemad/drivemad.html', i: 'drivemad.png' },
            { n: '2048', u: 'g/2048.html', i: '2048.png' },
            { n: 'Cookie Clicker', u: 'g/g/cookie/index.html', i: 'cookieclicker.png' },
            { n: 'Geometry Dash', u: 'g/geometrydash.html', i: 'geometrydash.png' },
            { n: 'Paper IO 2', u: 'g/paperio2.html', i: 'paperio2.png' }
        ];

        const grid = document.getElementById('grid');
        games.forEach(g => {
            const div = document.createElement('div');
            div.className = 'mobile-tile';
            div.innerHTML = `<img src="img/${g.i}" onerror="this.src='img/gams-g.png'"><div>${g.n}</div>`;
            div.onclick = () => loadGame(g.u);
            grid.appendChild(div);
        });
    </script>
</body>
</html>
